name: 'Build Tauri WhatsApp Web (Windows)'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache dihapus untuk menghindari error lock file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Download and create Windows icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          
          # Download WhatsApp icon
          curl -L "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" -o src-tauri/icons/icon-original.svg
          
          # Convert SVG to PNG using magick (ImageMagick)
          magick -background none -size 512x512 src-tauri/icons/icon-original.svg src-tauri/icons/icon-512.png
          
          # Create required icon sizes for Tauri
          magick src-tauri/icons/icon-512.png -resize 32x32 src-tauri/icons/32x32.png
          magick src-tauri/icons/icon-512.png -resize 128x128 src-tauri/icons/128x128.png
          magick src-tauri/icons/icon-512.png -resize 256x256 src-tauri/icons/128x128@2x.png
          
          # Create Windows .ico file with multiple resolutions
          magick src-tauri/icons/icon-512.png -define icon:auto-resize=256,128,64,48,32,16 src-tauri/icons/icon.ico
          
          echo "Icons created successfully"
          ls -la src-tauri/icons/

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'WhatsApp Web Desktop v__VERSION__'
          releaseBody: 'WhatsApp Web Desktop for Windows - No CORS, No Storage Issues'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-web-windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            dist/**/*
