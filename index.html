<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress Search Index</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4">

  <div class="mb-4">
    <h1 class="text-xl font-bold tracking-tight">Team Progress Engine</h1>
    <input type="text" id="searchBar" placeholder="Search logs (e.g. Done, B3, pump)..." 
           class="w-full mt-2 p-2 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-cyan-500">
  </div>

  <div id="logStream" class="space-y-3">
    <div class="p-3 bg-gray-800 rounded border border-gray-700">
      <p class="text-xs text-gray-400">Waiting for incoming workspace logs...</p>
    </div>
  </div>

  <script>
    // Simple polling loop to view records from your local Python SQLite sidecar
    async function checkNewLogs() {
      try {
        const res = await fetch('http://127.0.0.1:58000/api/get-logs');
        const logs = await res.json();
        const stream = document.getElementById('logStream');
        stream.innerHTML = '';
        
        logs.forEach(log => {
          stream.innerHTML += `
            <div class="p-3 bg-gray-800 rounded border border-gray-700">
              <div class="flex justify-between text-xs text-cyan-400 mb-1">
                <span>${log.sender_name} [${log.group_name}]</span>
              </div>
              <p class="text-sm">${log.text_content}</p>
              ${log.local_media_path ? `<span class="text-xs text-green-400">📎 Media Saved Box</span>` : ''}
            </div>`;
        });
      } catch (e) { /* Backend worker initializing */ }
    }
    setInterval(checkNewLogs, 3000);
  </script>
</body>
</html>
